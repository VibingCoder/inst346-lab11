<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>INST346 Lab 11 — Role Assignment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --bg:        #0d1117;
  --surface:   #161b22;
  --raised:    #1f2937;
  --border:    #30363d;
  --border-hi: #4a5568;
  --txt:       #f0f6fc;
  --txt-2:     #8b949e;
  --txt-3:     #484f58;
  --accent:    #58a6ff;
  --green:     #3fb950;
  --red:       #f85149;
  --amber:     #e3b341;
  --r1:        #58a6ff;
  --r2:        #3fb950;
  --r3:        #bc8cff;
  --r4:        #ffa657;
  --r1-bg:     rgba(88,166,255,0.10);
  --r2-bg:     rgba(63,185,80,0.10);
  --r3-bg:     rgba(188,140,255,0.10);
  --r4-bg:     rgba(255,166,87,0.10);
  --radius:    12px;
  --radius-lg: 18px;
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--txt);
  font-family: 'Outfit', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 40% at 20% 0%, rgba(88,166,255,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 100%, rgba(188,140,255,0.06) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* ── LAYOUT ── */
.wrap {
  position: relative; z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 20px 60px;
}

/* ── TYPOGRAPHY ── */
.mono { font-family: 'JetBrains Mono', monospace; }
.label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--txt-2);
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 28px;
}
.header-left .eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}
.header-left h1 {
  font-size: 26px; font-weight: 800;
  letter-spacing: -0.02em; line-height: 1.1;
}
.header-left .sub {
  font-size: 13px; color: var(--txt-2); margin-top: 4px;
}
.header-right {
  display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
  flex-shrink: 0;
}
.live-badge {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 12px; border-radius: 100px;
  background: var(--surface); border: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600; color: var(--txt-2);
}
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 0 rgba(63,185,80,.6);
  animation: heartbeat 2s infinite;
}
.live-dot.stale { background: var(--red); animation: none; }
@keyframes heartbeat {
  0%   { box-shadow: 0 0 0 0   rgba(63,185,80,.7); }
  70%  { box-shadow: 0 0 0 10px rgba(63,185,80,0); }
  100% { box-shadow: 0 0 0 0   rgba(63,185,80,0); }
}

/* ── SESSION BANNER ── */
.session-bar {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 14px 20px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 24px;
}
.session-bar .session-name {
  font-size: 20px; font-weight: 700; letter-spacing: -0.01em;
}
.progress-wrap { display: flex; align-items: center; gap: 10px; }
.progress-track {
  width: 90px; height: 6px;
  background: var(--raised); border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--accent); border-radius: 3px;
  transition: width 0.4s ease;
}
.progress-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 600; color: var(--accent);
  white-space: nowrap;
}

/* ── ROLE GRID ── */
.role-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  margin-bottom: 22px;
}
@media (max-width: 680px) { .role-grid { grid-template-columns: 1fr; } }

.role-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, opacity 0.3s;
}
.role-card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--rc);
}
.role-card.full { opacity: 0.5; }

.role-top {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
  margin-bottom: 10px;
}
.role-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--rc-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.role-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 100px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 600; text-transform: uppercase;
}
.badge-open  { background: rgba(63,185,80,0.15);  color: var(--green); }
.badge-full  { background: rgba(248,81,73,0.15);   color: var(--red); }
.badge-extra { background: rgba(227,179,65,0.15);  color: var(--amber); }

.role-name {
  font-size: 15px; font-weight: 700; line-height: 1.3;
  margin-bottom: 4px;
}
.role-desc {
  font-size: 12.5px; color: var(--txt-2); line-height: 1.45;
  margin-bottom: 14px;
}

/* Slot pips */
.slots-row {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.slots-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--txt-3); margin-right: 2px;
}
.pip {
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 7px; font-family: 'JetBrains Mono', monospace;
  font-weight: 700; color: #000; transition: all 0.25s ease;
}
.pip-empty {
  width: 32px; height: 32px; font-size: 14px;
  background: var(--raised); border: 1.5px dashed var(--border-hi); color: transparent;
}
.pip-filled {
  width: 32px; height: 32px; font-size: 13px;
  background: var(--rc); border: 1.5px solid var(--rc);
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.pip-override {
  width: 32px; height: 32px; font-size: 12px;
  background: var(--amber); border: 1.5px solid var(--amber);
}
@keyframes popIn {
  0%   { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1);   opacity: 1; }
}

/* PROJECTOR — big pip mode */
body.projector .wrap    { max-width: 100%; padding: 32px 48px 60px; }
body.projector h1       { font-size: 38px; }
body.projector .session-name { font-size: 30px; }
body.projector .role-card { padding: 28px; }
body.projector .role-name { font-size: 20px; }
body.projector .role-desc { font-size: 15px; }
body.projector .role-icon { width: 52px; height: 52px; font-size: 26px; }
body.projector .pip-empty,
body.projector .pip-filled,
body.projector .pip-override {
  width: 72px; height: 72px; font-size: 32px; border-radius: 14px;
}
body.projector .progress-track { width: 140px; height: 8px; }
body.projector .progress-label { font-size: 18px; }
body.projector .live-badge     { font-size: 13px; padding: 6px 16px; }
body.projector .live-dot       { width: 12px; height: 12px; }
body.projector #action-area    { display: none; }
body.projector #admin-btn      { display: none; }
body.projector footer          { display: none; }

/* ── ACTION AREA ── */
#action-area {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 28px;
  margin-bottom: 24px;
}
.step-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--txt-2); margin-bottom: 8px;
}
.action-title {
  font-size: 22px; font-weight: 800; letter-spacing: -0.02em;
  margin-bottom: 6px;
}
.action-sub { font-size: 14px; color: var(--txt-2); margin-bottom: 22px; }

/* Input */
.input-row { display: flex; gap: 10px; }
.field {
  flex: 1; padding: 14px 16px;
  background: var(--raised); border: 1.5px solid var(--border-hi);
  border-radius: var(--radius); color: var(--txt);
  font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600;
  outline: none; transition: border-color 0.15s;
  appearance: textfield; -moz-appearance: textfield;
}
.field::-webkit-outer-spin-button,
.field::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.field:focus { border-color: var(--accent); }
.field::placeholder { color: var(--txt-3); font-size: 15px; font-weight: 400; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 13px 22px; border-radius: var(--radius);
  font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600;
  border: 1.5px solid transparent; cursor: pointer;
  transition: all 0.15s ease; white-space: nowrap; text-decoration: none;
}
.btn-primary {
  background: var(--accent); color: #04111d;
  border-color: var(--accent);
}
.btn-primary:hover { background: #79baff; border-color: #79baff; transform: translateY(-1px); }
.btn-primary:active { transform: none; }
.btn-ghost {
  background: transparent; color: var(--txt-2); border-color: var(--border);
}
.btn-ghost:hover { background: var(--raised); color: var(--txt); }
.btn-danger {
  background: transparent; color: var(--red); border-color: rgba(248,81,73,0.4);
}
.btn-danger:hover { background: rgba(248,81,73,0.1); }
.btn-full { width: 100%; }
.btn:disabled {
  opacity: 0.35; cursor: not-allowed; transform: none !important;
}

/* Role selection buttons */
.role-pick-btn {
  display: flex; align-items: center; gap: 14px;
  width: 100%; padding: 16px 18px;
  background: var(--raised); border: 1.5px solid var(--border-hi);
  border-radius: var(--radius); cursor: pointer;
  transition: all 0.15s ease; text-align: left; color: var(--txt);
}
.role-pick-btn:hover:not(:disabled) {
  border-color: var(--rc);
  background: var(--rc-bg);
  transform: translateX(3px);
}
.role-pick-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.role-pick-icon {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--rc-bg); display: flex; align-items: center;
  justify-content: center; font-size: 18px; flex-shrink: 0;
}
.role-pick-text { flex: 1; }
.role-pick-text .name { font-size: 15px; font-weight: 700; }
.role-pick-text .sub {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--txt-2); margin-top: 2px;
}
.pick-arrow { color: var(--rc); font-size: 20px; font-weight: 700; flex-shrink: 0; }

/* Registered card */
.registered-card {
  background: var(--raised); border-radius: var(--radius);
  padding: 18px; border-left: 4px solid var(--rc);
}
.registered-card .role-label { font-size: 13px; color: var(--txt-2); margin-bottom: 4px; }
.registered-card .role-value { font-size: 17px; font-weight: 700; }
.registered-card .how { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--txt-3); margin-top: 4px; }

/* Waiting state */
.waiting-box {
  background: rgba(227,179,65,0.08); border: 1.5px solid rgba(227,179,65,0.35);
  border-radius: var(--radius); padding: 18px; margin-bottom: 18px;
}
.waiting-box .wt { font-size: 14px; color: var(--amber); font-weight: 600; }
.waiting-box .ws { font-size: 13px; color: var(--txt-2); margin-top: 4px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(1,4,9,0.85); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px; z-index: 999;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface); border: 1px solid var(--border-hi);
  border-radius: 20px; max-width: 640px; width: 100%;
  max-height: 90vh; overflow-y: auto; padding: 28px;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Admin sections */
.admin-section { margin-bottom: 24px; }
.admin-section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--txt-3); margin-bottom: 10px;
}
.board-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  background: var(--raised); border-radius: var(--radius); margin-bottom: 6px;
  border-left: 3px solid var(--rc);
}
.board-row-name { font-size: 13px; font-weight: 600; flex: 1; }
.session-tab-row { display: flex; gap: 8px; flex-wrap: wrap; }
.session-tab {
  padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
  border: 1.5px solid var(--border); color: var(--txt-2);
  background: transparent; cursor: pointer; transition: all 0.15s;
  font-family: 'JetBrains Mono', monospace;
}
.session-tab.active { background: var(--accent); border-color: var(--accent); color: #04111d; }
.session-tab:hover:not(.active) { border-color: var(--border-hi); color: var(--txt); }
.unplaced-box {
  background: rgba(227,179,65,0.08); border: 1.5px solid rgba(227,179,65,0.4);
  border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
}
.assign-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.select {
  flex: 1; min-width: 120px; padding: 11px 14px;
  background: var(--raised); border: 1.5px solid var(--border-hi);
  border-radius: var(--radius); color: var(--txt); font-size: 14px;
  outline: none; cursor: pointer;
}
.qr-box {
  display: flex; align-items: center; gap: 16px; padding: 16px;
  background: var(--raised); border-radius: var(--radius);
}
.qr-box img { width: 130px; height: 130px; border-radius: 8px; }
.qr-url { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--txt-2); word-break: break-all; }
.danger-zone {
  background: rgba(248,81,73,0.07); border: 1px solid rgba(248,81,73,0.25);
  border-radius: var(--radius); padding: 16px;
}
.group-chip {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 30px; height: 24px; padding: 0 7px;
  border-radius: 5px; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 700; color: #000; margin: 2px 3px 2px 0;
}

/* Remove input */
.remove-row { display: flex; gap: 8px; }
.remove-input {
  width: 100px; padding: 11px 14px;
  background: var(--raised); border: 1.5px solid var(--border-hi);
  border-radius: var(--radius); color: var(--txt);
  font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600;
  outline: none;
  appearance: textfield; -moz-appearance: textfield;
}
.remove-input::-webkit-outer-spin-button,
.remove-input::-webkit-inner-spin-button { -webkit-appearance: none; }

/* ── TOAST ── */
#toast-root {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column; gap: 8px;
  align-items: center; z-index: 9999; pointer-events: none;
}
.toast {
  padding: 12px 20px; border-radius: 10px;
  font-size: 14px; font-weight: 500;
  border: 1.5px solid var(--border);
  background: var(--surface); color: var(--txt);
  animation: toastIn 0.3s ease; pointer-events: none;
  max-width: 90vw; text-align: center;
}
.toast.ok   { border-color: var(--green); }
.toast.err  { border-color: var(--red); }
.toast.warn { border-color: var(--amber); }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── FOOTER ── */
footer {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px;
  padding-top: 20px; border-top: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--txt-3);
}

/* Divider */
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* Space helpers */
.mt8  { margin-top: 8px;  }
.mt12 { margin-top: 12px; }
.mt16 { margin-top: 16px; }
.mt20 { margin-top: 20px; }
.mb8  { margin-bottom: 8px; }
.space-y > * + * { margin-top: 8px; }
.flex  { display: flex; }
.gap8  { gap: 8px; }
.gap12 { gap: 12px; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.flex-1 { flex: 1; }
.text-right { text-align: right; }
</style>
</head>
<body>

<div class="wrap">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="eyebrow">INST346 · Lab 11</div>
      <h1>Role Assignment Board</h1>
      <div class="sub">Specifications Lab, Part 1 &nbsp;·&nbsp; Dr. Frezzo</div>
    </div>
    <div class="header-right">
      <div class="live-badge">
        <div id="live-dot" class="live-dot"></div>
        <span>LIVE</span>
      </div>
      <button id="admin-btn" class="btn btn-ghost" style="font-size:13px; padding:8px 14px;">⚙ TA</button>
    </div>
  </header>

  <!-- SESSION BAR -->
  <div class="session-bar">
    <div>
      <div class="label" style="margin-bottom:4px;">Current Session</div>
      <div id="session-name" class="session-name">—</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill" style="width:0%"></div>
      </div>
      <div id="progress-label" class="progress-label">0 / 9</div>
    </div>
  </div>

  <!-- ROLE CARDS -->
  <div id="role-grid" class="role-grid"></div>

  <!-- ACTION AREA -->
  <section id="action-area"></section>

  <!-- FOOTER -->
  <footer>
    <div>INST346 · TECHNOLOGIES, INFRASTRUCTURE &amp; ARCHITECTURE</div>
    <div>Last synced: <span id="sync-time">—</span></div>
  </footer>

</div>

<!-- ADMIN MODAL -->
<div id="admin-overlay" class="modal-overlay" style="display:none;" onclick="closeAdmin()">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="admin-body"></div>
  </div>
</div>

<!-- TOASTS -->
<div id="toast-root"></div>

<script>
/* ═══════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════ */
const FIREBASE_URL   = 'https://inst346-lab11-default-rtdb.firebaseio.com';
const ADMIN_PASSWORD = 'frezzo346';
const NORMAL_SLOTS   = 2;
const TOTAL_GROUPS   = 9;
const POLL_MS        = 3500;

/* ═══════════════════════════════════════════
   ROLE DEFINITIONS
═══════════════════════════════════════════ */
const ROLES = [
  { id: 'telecommuter',    name: 'Telecommuter Project Managers',    short: 'Home Network',    desc: 'Research the best home network & ISP plan for all 10 remote employees.', icon: '🏠', color: 'var(--r1)', colorHex: '#58a6ff', colorBg: 'var(--r1-bg)' },
  { id: 'onprem_computing', name: 'On-Premises Computing Technicians', short: 'Office Hardware',  desc: 'Configure workstations, servers, and client systems for the on-site office.', icon: '🖥️', color: 'var(--r2)', colorHex: '#3fb950', colorBg: 'var(--r2-bg)' },
  { id: 'onprem_network',  name: 'On-Premises Network Technicians',  short: 'Office Network',   desc: 'Design the office LAN — firewall, switches, routers, and access points.', icon: '🔌', color: 'var(--r3)', colorHex: '#bc8cff', colorBg: 'var(--r3-bg)' },
  { id: 'cloud',           name: 'Cloud Services Administrators',    short: 'Cloud Services',   desc: 'Choose cloud subscriptions for both teleworkers and the on-site lab.', icon: '☁️', color: 'var(--r4)', colorHex: '#ffa657', colorBg: 'var(--r4-bg)' },
];

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let state = {
  sessionKey: null, sessionLabel: null, slot: null,
  data: blankData(),
  myGroup: null,
  connected: true,
  manualSession: false, // true when TA has manually picked a session
};

// Hashes to track what actually changed — prevents unnecessary DOM rebuilds
let lastCardsHash   = '';
let lastActionHash  = '';
let lastHeaderState = '';

function blankData() {
  const a = {};
  ROLES.forEach(r => { a[r.id] = { normal: [], override: [] }; });
  return { assignments: a, updated: Date.now() };
}

/* ═══════════════════════════════════════════
   SESSION KEY
═══════════════════════════════════════════ */
function getSessionKey(forceSlot) {
  const now   = new Date();
  const d     = now.toISOString().slice(0, 10);
  const SLOTS = ['0900','1000','1100'];
  const slot  = SLOTS.includes(forceSlot)
    ? forceSlot
    : (now.getHours() < 10 ? '0900' : now.getHours() < 11 ? '1000' : '1100');
  const labels = { '0900': '9:00 AM Section', '1000': '10:00 AM Section', '1100': '11:00 AM Section' };
  return { key: `inst346_lab11_${d}_${slot}`, label: labels[slot], slot };
}

/* ═══════════════════════════════════════════
   FIREBASE
═══════════════════════════════════════════ */
function firebasePath() { return `${FIREBASE_URL}/sessions/${state.sessionKey}.json`; }

async function loadState() {
  try {
    const res  = await fetch(firebasePath());
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    if (data && data.assignments) {
      ROLES.forEach(r => {
        if (!data.assignments[r.id]) data.assignments[r.id] = { normal: [], override: [] };
        // Firebase can turn arrays into objects when keys are missing — normalise
        ['normal', 'override'].forEach(k => {
          if (!Array.isArray(data.assignments[r.id][k]))
            data.assignments[r.id][k] = Object.values(data.assignments[r.id][k] || {});
        });
      });
      state.data = data;
    } else {
      state.data = blankData();
    }
    state.connected = true;
  } catch (e) {
    console.warn('loadState failed', e);
    state.connected = false;
  }
}

async function saveState() {
  state.data.updated = Date.now();
  try {
    const res = await fetch(firebasePath(), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state.data),
    });
    if (!res.ok) throw new Error(res.status);
    state.connected = true;
    return true;
  } catch (e) {
    console.error('saveState failed', e);
    state.connected = false;
    toast('Could not save — check Firebase rules', 'err');
    return false;
  }
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function totalFilled() {
  return ROLES.reduce((s, r) => {
    const a = state.data.assignments[r.id];
    return s + a.normal.length + a.override.length;
  }, 0);
}
function slotsLeft(roleId) {
  return NORMAL_SLOTS - state.data.assignments[roleId].normal.length;
}
function roleFullForStudents(roleId) { return slotsLeft(roleId) <= 0; }
function allRolesFull() { return ROLES.every(r => roleFullForStudents(r.id)); }

function getRoleForGroup(g) {
  for (const r of ROLES) {
    const a = state.data.assignments[r.id];
    if (a.normal.includes(g))   return { roleId: r.id, isOverride: false };
    if (a.override.includes(g)) return { roleId: r.id, isOverride: true };
  }
  return null;
}

function assignmentsHash() { return JSON.stringify(state.data.assignments); }

function actionHash() {
  const reg = getRoleForGroup(state.myGroup);
  return `${state.myGroup}|${reg ? reg.roleId + reg.isOverride : 'none'}|${allRolesFull()}`;
}

function headerHash() {
  return `${state.sessionLabel}|${totalFilled()}|${state.connected}`;
}

function timeAgo(ts) {
  if (!ts) return 'just now';
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 5)  return 'just now';
  if (s < 60) return s + 's ago';
  return Math.floor(s / 60) + 'm ago';
}

/* ═══════════════════════════════════════════
   RENDER — SMART DIFFING
   Only touches DOM sections that actually changed
═══════════════════════════════════════════ */
function render() {
  // Header / session bar
  const hh = headerHash();
  if (hh !== lastHeaderState) {
    lastHeaderState = hh;
    document.getElementById('session-name').textContent = state.sessionLabel || '—';
    const filled = totalFilled();
    document.getElementById('progress-label').textContent = `${filled} / ${TOTAL_GROUPS}`;
    document.getElementById('progress-fill').style.width = `${(filled / TOTAL_GROUPS) * 100}%`;
    document.getElementById('live-dot').className = 'live-dot' + (state.connected ? '' : ' stale');
  }

  // Sync time — always update (cheap textContent)
  document.getElementById('sync-time').textContent = timeAgo(state.data.updated);

  // Role cards — only rebuild if assignments changed
  const ah = assignmentsHash();
  if (ah !== lastCardsHash) {
    lastCardsHash = ah;
    document.getElementById('role-grid').innerHTML = ROLES.map(renderRoleCard).join('');
  }

  // Action area — only rebuild if relevant state changed
  const act = actionHash();
  if (act !== lastActionHash) {
    lastActionHash = act;
    document.getElementById('action-area').innerHTML = renderAction();
    attachActionHandlers();
  }
}

/* ── Role card HTML ── */
function renderRoleCard(role) {
  const a    = state.data.assignments[role.id];
  const full = roleFullForStudents(role.id);
  const hasExtra = a.override.length > 0;

  // Pips
  let pips = '';
  for (let i = 0; i < NORMAL_SLOTS; i++) {
    const g = a.normal[i];
    pips += g !== undefined
      ? `<span class="pip pip-filled" style="--rc:${role.color}; --rc-bg:${role.colorBg};">${g}</span>`
      : `<span class="pip pip-empty"></span>`;
  }
  a.override.forEach(g => {
    pips += `<span class="pip pip-override">${g}</span>`;
  });

  // Badge
  let badge;
  if (hasExtra)  badge = `<span class="role-badge badge-extra">★ 9th assigned</span>`;
  else if (full) badge = `<span class="role-badge badge-full">Full</span>`;
  else           badge = `<span class="role-badge badge-open">${slotsLeft(role.id)} slot${slotsLeft(role.id)>1?'s':''} open</span>`;

  return `
    <div class="role-card ${full && !hasExtra ? 'full' : ''}"
         style="--rc:${role.color}; --rc-bg:${role.colorBg};">
      <div class="role-top">
        <div class="role-icon" style="--rc-bg:${role.colorBg};">${role.icon}</div>
        ${badge}
      </div>
      <div class="role-name">${role.name}</div>
      <div class="role-desc">${role.desc}</div>
      <div class="slots-row">
        <span class="slots-label">GROUPS:</span>
        ${pips}
      </div>
    </div>`;
}

/* ── Action area HTML ── */
function renderAction() {
  // Step 1: no group yet
  if (!state.myGroup) {
    return `
      <div class="step-tag">Step 1 of 2</div>
      <div class="action-title">What's your group number?</div>
      <div class="action-sub">Your TA assigned groups 1–${TOTAL_GROUPS}. Enter yours below to continue.</div>
      <div class="input-row">
        <input id="group-input" class="field" type="number" min="1" max="${TOTAL_GROUPS}"
               placeholder="e.g.  3" autocomplete="off">
        <button id="group-next" class="btn btn-primary">Continue →</button>
      </div>`;
  }

  const reg = getRoleForGroup(state.myGroup);

  // Already registered
  if (reg) {
    const role = ROLES.find(r => r.id === reg.roleId);
    return `
      <div class="step-tag" style="color: var(--green);">✓ You're all set — Group ${state.myGroup}</div>
      <div class="action-title">Role confirmed!</div>
      <div class="action-sub" style="margin-bottom:14px;">Your group's expert area for Part 1:</div>
      <div class="registered-card" style="--rc:${role.color};">
        <div class="flex items-center gap12">
          <span style="font-size:28px;">${role.icon}</span>
          <div>
            <div class="registered-card role-label">${role.short}</div>
            <div class="registered-card role-value">${role.name}</div>
            <div class="registered-card how">${reg.isOverride ? 'Assigned by TA' : 'Self-selected'}</div>
          </div>
        </div>
      </div>
      <button id="clear-group" class="btn btn-ghost mt16" style="font-size:13px; padding:8px 14px;">
        ← Not Group ${state.myGroup}? Re-enter number
      </button>`;
  }

  // All slots taken — 9th group waiting
  if (allRolesFull()) {
    return `
      <div class="step-tag" style="color: var(--amber);">⚠ All slots taken — Group ${state.myGroup}</div>
      <div class="action-title">Please wait for TA assignment</div>
      <div class="waiting-box mt12">
        <div class="wt">Your TA will assign your group now</div>
        <div class="ws">All 8 self-select slots are taken. The board will update automatically once the TA assigns you — no need to refresh.</div>
      </div>
      <button id="clear-group" class="btn btn-ghost" style="font-size:13px; padding:8px 14px;">
        ← Wrong group number?
      </button>`;
  }

  // Step 2: pick a role
  const roleButtons = ROLES.map(r => {
    const full = roleFullForStudents(r.id);
    const sl   = slotsLeft(r.id);
    return `
      <button class="role-pick-btn role-claim" data-role="${r.id}"
              style="--rc:${r.color}; --rc-bg:${r.colorBg};"
              ${full ? 'disabled' : ''}>
        <span class="role-pick-icon" style="--rc-bg:${r.colorBg};">${r.icon}</span>
        <span class="role-pick-text">
          <span class="name">${r.name}</span>
          <span class="sub">${full ? 'FULL' : sl + ' slot' + (sl>1?'s':'') + ' remaining'}</span>
        </span>
        ${full ? '' : `<span class="pick-arrow" style="color:${r.color};">→</span>`}
      </button>`;
  }).join('');

  return `
    <div class="step-tag">Step 2 of 2 &nbsp;·&nbsp; Group ${state.myGroup}</div>
    <div class="action-title">Pick your expert role</div>
    <div class="action-sub">First-come, first-served. Choose the area your group will research for Part 1.</div>
    <div class="space-y">${roleButtons}</div>
    <button id="clear-group" class="btn btn-ghost mt16" style="font-size:13px; padding:8px 14px;">
      ← Change group number
    </button>`;
}

/* ── Attach handlers (called once after action area rebuild) ── */
function attachActionHandlers() {
  const gn = document.getElementById('group-next');
  if (gn) {
    const inp = document.getElementById('group-input');
    const go  = () => {
      const v = parseInt(inp.value, 10);
      if (isNaN(v) || v < 1 || v > TOTAL_GROUPS) {
        toast(`Enter a number between 1 and ${TOTAL_GROUPS}`, 'err'); return;
      }
      state.myGroup = v;
      lastActionHash = ''; // force rebuild
      render();
    };
    gn.onclick = go;
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
    inp.focus();
  }
  const cb = document.getElementById('clear-group');
  if (cb) cb.onclick = () => { state.myGroup = null; lastActionHash = ''; render(); };
  document.querySelectorAll('.role-claim').forEach(btn => {
    btn.onclick = () => claimRole(btn.dataset.role);
  });
}

/* ═══════════════════════════════════════════
   CLAIM ROLE
═══════════════════════════════════════════ */
async function claimRole(roleId) {
  // Re-read before committing (race condition guard)
  await loadState();
  const existing = getRoleForGroup(state.myGroup);
  if (existing) {
    const r = ROLES.find(x => x.id === existing.roleId);
    toast(`Group ${state.myGroup} is already registered as ${r.short} ✓`, 'ok');
    lastCardsHash = ''; lastActionHash = '';
    render(); return;
  }
  if (roleFullForStudents(roleId)) {
    const r = ROLES.find(x => x.id === roleId);
    toast(`${r.short} was just taken — please pick another`, 'err');
    lastCardsHash = ''; lastActionHash = '';
    render(); return;
  }
  state.data.assignments[roleId].normal.push(state.myGroup);
  const ok = await saveState();
  if (ok) {
    const r = ROLES.find(x => x.id === roleId);
    toast(`Group ${state.myGroup} locked in as ${r.name} ✓`, 'ok');
  }
  lastCardsHash = ''; lastActionHash = '';
  render();
}

/* ═══════════════════════════════════════════
   ADMIN PANEL
═══════════════════════════════════════════ */
function openAdmin() {
  const pw = prompt('TA password:');
  if (pw === null) return;
  if (pw !== ADMIN_PASSWORD) { toast('Wrong password', 'err'); return; }
  renderAdmin();
  document.getElementById('admin-overlay').style.display = 'flex';
}
function closeAdmin() { document.getElementById('admin-overlay').style.display = 'none'; }

function renderAdmin() {
  const pageUrl     = window.location.href.split('?')[0];
  const projUrl     = pageUrl + `?board=1&slot=${state.slot}`;
  const qrUrl       = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&bgcolor=161b22&color=f0f6fc&data=${encodeURIComponent(pageUrl)}`;

  // Build placed / unplaced
  const placed = new Set();
  ROLES.forEach(r => {
    state.data.assignments[r.id].normal.forEach(g => placed.add(g));
    state.data.assignments[r.id].override.forEach(g => placed.add(g));
  });
  const unplaced = [];
  for (let i = 1; i <= TOTAL_GROUPS; i++) if (!placed.has(i)) unplaced.push(i);

  // Board rows
  const boardRows = ROLES.map(r => {
    const a   = state.data.assignments[r.id];
    const all = [
      ...a.normal.map(g => ({ g, ov: false })),
      ...a.override.map(g => ({ g, ov: true })),
    ];
    const chips = all.length === 0
      ? `<span style="font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--txt-3);">(empty)</span>`
      : all.map(x => `<span class="group-chip" style="background:${x.ov ? 'var(--amber)' : r.colorHex};">G${x.g}${x.ov ? ' ★' : ''}</span>`).join('');
    return `
      <div class="board-row" style="--rc:${r.color};">
        <span class="board-row-name">${r.icon} ${r.short}</span>
        <div>${chips}</div>
      </div>`;
  }).join('');

  // Unplaced section
  const unplacedHtml = unplaced.length > 0 ? `
    <div class="unplaced-box">
      <div style="font-size:13px; font-weight:600; color:var(--amber);">⚠ Unplaced group(s): ${unplaced.map(g=>`Group ${g}`).join(', ')}</div>
      <div class="assign-row">
        <select id="admin-group" class="select">
          ${unplaced.map(g => `<option value="${g}">Group ${g}</option>`).join('')}
        </select>
        <select id="admin-role" class="select">
          ${ROLES.map(r => `<option value="${r.id}">${r.icon} ${r.short}</option>`).join('')}
        </select>
        <button onclick="adminAssign()" class="btn btn-primary">Assign</button>
      </div>
    </div>` : `
    <div style="padding:12px 14px; background:var(--raised); border-radius:var(--radius); font-size:13px; color:var(--green);">
      ✓ All ${TOTAL_GROUPS} groups are placed
    </div>`;

  document.getElementById('admin-body').innerHTML = `
    <div class="flex items-center justify-between mb8">
      <div>
        <div class="label" style="margin-bottom:4px;">TA Admin Panel</div>
        <div style="font-size:20px; font-weight:800;">Session Controls</div>
      </div>
      <button onclick="closeAdmin()" class="btn btn-ghost" style="padding:7px 12px; font-size:13px;">✕ Close</button>
    </div>

    <div class="divider"></div>

    <div class="admin-section">
      <div class="admin-section-label">📺 Projection View</div>
      <a href="${projUrl}" target="_blank" class="btn btn-primary btn-full">
        Open Classroom Board (large view) ↗
      </a>
    </div>

    <div class="admin-section">
      <div class="admin-section-label">Switch Session</div>
      <div class="session-tab-row">
        <button class="session-tab ${state.slot==='0900'?'active':''}" onclick="switchSession('0900')">9:00 AM</button>
        <button class="session-tab ${state.slot==='1000'?'active':''}" onclick="switchSession('1000')">10:00 AM</button>
        <button class="session-tab ${state.slot==='1100'?'active':''}" onclick="switchSession('1100')">11:00 AM</button>
        <button class="session-tab ${!['0900','1000','1100'].includes(state.slot)?'active':''}" onclick="switchSession('auto')">Auto</button>
      </div>
    </div>

    <div class="admin-section">
      <div class="admin-section-label">Current Board — ${state.sessionLabel}</div>
      ${boardRows}
    </div>

    <div class="admin-section">
      ${unplacedHtml}
    </div>

    <div class="admin-section">
      <div class="admin-section-label">Remove a Group</div>
      <div class="remove-row">
        <input id="admin-remove" class="remove-input" type="number" min="1" max="${TOTAL_GROUPS}" placeholder="G#">
        <button onclick="adminRemove()" class="btn btn-ghost">Unassign</button>
      </div>
    </div>

    <div class="admin-section">
      <div class="admin-section-label">QR Code for Students</div>
      <div class="qr-box">
        <img src="${qrUrl}" alt="QR">
        <div>
          <div class="qr-url mb8">${pageUrl}</div>
          <button onclick="navigator.clipboard.writeText('${pageUrl}'); toast('Link copied ✓', 'ok');"
                  class="btn btn-ghost" style="font-size:12px; padding:7px 12px;">Copy Link</button>
        </div>
      </div>
    </div>

    <div class="danger-zone">
      <div class="admin-section-label" style="color:var(--red); margin-bottom:10px;">Danger Zone</div>
      <button onclick="adminReset()" class="btn btn-danger">
        Reset ${state.sessionLabel} board
      </button>
    </div>`;
}

async function switchSession(slot) {
  state.manualSession = (slot !== 'auto');
  const s = slot === 'auto' ? getSessionKey() : getSessionKey(slot);
  state.sessionKey = s.key; state.sessionLabel = s.label; state.slot = s.slot;
  await loadState();
  lastCardsHash = ''; lastActionHash = ''; lastHeaderState = '';
  renderAdmin(); render();
}

async function adminAssign() {
  const group = parseInt(document.getElementById('admin-group').value, 10);
  const role  = document.getElementById('admin-role').value;
  await loadState();
  ROLES.forEach(r => {
    state.data.assignments[r.id].normal  = state.data.assignments[r.id].normal.filter(g => g !== group);
    state.data.assignments[r.id].override = state.data.assignments[r.id].override.filter(g => g !== group);
  });
  state.data.assignments[role].override.push(group);
  await saveState();
  lastCardsHash = ''; lastActionHash = '';
  renderAdmin(); render();
  toast(`Group ${group} assigned ✓`, 'ok');
}

async function adminRemove() {
  const group = parseInt(document.getElementById('admin-remove').value, 10);
  if (isNaN(group) || group < 1 || group > TOTAL_GROUPS) { toast('Enter a valid group number', 'err'); return; }
  await loadState();
  let removed = false;
  ROLES.forEach(r => {
    const before = state.data.assignments[r.id].normal.length + state.data.assignments[r.id].override.length;
    state.data.assignments[r.id].normal  = state.data.assignments[r.id].normal.filter(g => g !== group);
    state.data.assignments[r.id].override = state.data.assignments[r.id].override.filter(g => g !== group);
    if (state.data.assignments[r.id].normal.length + state.data.assignments[r.id].override.length < before) removed = true;
  });
  if (removed) {
    await saveState();
    lastCardsHash = ''; lastActionHash = '';
    renderAdmin(); render();
    toast(`Group ${group} unassigned`, 'ok');
  } else {
    toast(`Group ${group} wasn't assigned`, 'err');
  }
}

async function adminReset() {
  if (!confirm(`Reset "${state.sessionLabel}"? All assignments will be cleared.`)) return;
  state.data = blankData();
  await saveState();
  lastCardsHash = ''; lastActionHash = '';
  renderAdmin(); render();
  toast('Board reset', 'ok');
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
function toast(msg, kind = 'ok') {
  const root = document.getElementById('toast-root');
  const el   = document.createElement('div');
  el.className = `toast ${kind}`;
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity 0.3s';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 350);
  }, 3000);
}

/* ═══════════════════════════════════════════
   PROJECTION MODE
═══════════════════════════════════════════ */
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('board') === '1') {
  document.body.classList.add('projector');
}

/* ═══════════════════════════════════════════
   INIT + POLL LOOP
═══════════════════════════════════════════ */
async function init() {
  // If a slot was passed in the URL (e.g. from TA's projector link), use it
  const urlSlot = urlParams.get('slot');  // e.g. '1000' or '1100'
  const s = getSessionKey(urlSlot || null);
  state.sessionKey = s.key; state.sessionLabel = s.label; state.slot = s.slot;
  if (urlSlot) state.manualSession = true;

  document.getElementById('admin-btn').onclick = openAdmin;

  await loadState();
  render();

  setInterval(async () => {
    // Only auto-switch on natural hour boundary — never override a manual TA session pick
    if (!state.manualSession) {
      const cs = getSessionKey();
      if (cs.key !== state.sessionKey) {
        state.sessionKey = cs.key; state.sessionLabel = cs.label; state.slot = cs.slot;
        state.myGroup = null;
        lastCardsHash = ''; lastActionHash = ''; lastHeaderState = '';
      }
    }
    await loadState();
    render();
  }, POLL_MS);
}

init();
</script>
