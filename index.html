<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>INST346 Lab 11 — Role Assignment</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg-primary: #0a0e17; --bg-card: #141a26; --bg-elevated: #1d2433; --bg-hover: #252d3f; --border: #2a3447; --border-bright: #3a4560; --text-primary: #e8ecf4; --text-secondary: #b4bdd0; --text-muted: #6b7691; --accent: #00d4ff; --success: #10d48e; --danger: #ff5577; --warning: #ffb547; --role-1: #4f8eff; --role-2: #10d48e; --role-3: #b366ff; --role-4: #ff9647; }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; background: var(--bg-primary); color: var(--text-primary); font-family: 'Instrument Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,212,255,0.08), transparent), radial-gradient(ellipse 60% 40% at 100% 100%, rgba(179,102,255,0.05), transparent); pointer-events: none; z-index: 0; }
  body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .main-wrap { position: relative; z-index: 1; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .display { font-family: 'JetBrains Mono', monospace; letter-spacing: -0.02em; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; transition: all 0.2s ease; }
  .card-role { position: relative; overflow: hidden; }
  .card-role::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--role-color); opacity: 0.95; }
  .card-role.full { opacity: 0.55; }
  .live-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); box-shadow: 0 0 0 0 rgba(16,212,142,0.6); animation: pulse 2s infinite; }
  .live-dot.stale { background: var(--danger); animation: none; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16,212,142,0.7); } 70% { box-shadow: 0 0 0 12px rgba(16,212,142,0); } 100% { box-shadow: 0 0 0 0 rgba(16,212,142,0); } }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeSlide 0.4s ease forwards; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; border-radius: 10px; font-weight: 600; font-size: 14px; transition: all 0.15s ease; cursor: pointer; border: 1px solid transparent; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #001820; }
  .btn-primary:hover { background: #2ee2ff; transform: translateY(-1px); }
  .btn-primary:disabled { background: var(--bg-elevated); color: var(--text-muted); cursor: not-allowed; transform: none; }
  .btn-ghost { background: transparent; color: var(--text-secondary); border-color: var(--border); }
  .btn-ghost:hover { background: var(--bg-elevated); color: var(--text-primary); }
  .btn-role { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border-bright); width: 100%; padding: 14px; text-align: left; }
  .btn-role:hover:not(:disabled) { background: var(--bg-hover); border-color: var(--role-color); transform: translateY(-1px); }
  .btn-role:disabled { opacity: 0.4; cursor: not-allowed; }
  .input { width: 100%; padding: 14px 16px; background: var(--bg-elevated); border: 1px solid var(--border-bright); border-radius: 10px; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 16px; outline: none; transition: border-color 0.15s; }
  .input:focus { border-color: var(--accent); }

  /* DEFAULT (mobile) slot pips */
  .slot-pip { display: inline-block; width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--border-bright); background: var(--bg-elevated); font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; text-align: center; line-height: 25px; color: var(--text-muted); margin-right: 5px; }
  .slot-pip.filled { background: var(--role-color); color: #000; border-color: var(--role-color); }
  .slot-pip.override { background: var(--warning); color: #000; border-color: var(--warning); }

  /* DESKTOP — bigger pips/badges for laptop/screen view */
  @media (min-width: 768px) {
    .slot-pip { width: 42px; height: 42px; font-size: 20px; line-height: 38px; border-radius: 8px; margin-right: 8px; }
    .card-role { padding: 1.5rem !important; }
    #session-label { font-size: 28px !important; }
    #total-filled { font-size: 28px !important; }
  }

  .status-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 100px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .chip-open { background: rgba(16,212,142,0.15); color: var(--success); }
  .chip-full { background: rgba(255,85,119,0.15); color: var(--danger); }
  .chip-override { background: rgba(255,181,71,0.15); color: var(--warning); }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(5,8,15,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50; animation: fadeSlide 0.2s ease; }
  .modal { background: var(--bg-card); border: 1px solid var(--border-bright); border-radius: 16px; max-width: 640px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 28px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--bg-elevated); border: 1px solid var(--border-bright); border-radius: 10px; padding: 14px 20px; z-index: 100; animation: fadeSlide 0.3s ease; max-width: 90vw; }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }
  .tab-btn { padding: 10px 16px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #001820; }
  .tab-btn:hover:not(.active) { border-color: var(--border-bright); color: var(--text-primary); }
  .group-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 34px; height: 28px; padding: 0 8px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; margin: 2px 4px 2px 0; color: #000; }
  .setup-banner { background: rgba(255,181,71,0.12); border: 1px solid var(--warning); border-radius: 12px; padding: 16px; margin-bottom: 16px; }

  /* ═══════════════════════════════════════════
     PROJECTION MODE — activated via ?board=1
     Designed for classroom screen, 15-30ft away
     ═══════════════════════════════════════════ */
  body.projector .main-wrap { max-width: 100%; padding: 2rem 3rem !important; }
  body.projector h1 { font-size: 44px !important; }
  body.projector header .mono { font-size: 16px !important; }
  body.projector header > div > .text-sm { font-size: 18px !important; }
  body.projector #session-label { font-size: 42px !important; }
  body.projector #total-filled { font-size: 46px !important; }
  body.projector h2.display { font-size: 20px !important; letter-spacing: 0.08em; }
  body.projector .card-role { padding: 2rem !important; }
  body.projector .card-role .role-short { font-size: 16px !important; letter-spacing: 0.1em; }
  body.projector .card-role .role-name { font-size: 30px !important; line-height: 1.15 !important; }
  body.projector .card-role .role-desc { font-size: 17px !important; margin-bottom: 20px !important; }
  body.projector .slot-pip { 
    width: 82px !important; height: 82px !important; 
    font-size: 42px !important; line-height: 78px !important;
    border-radius: 14px !important; margin-right: 14px !important;
    border-width: 3px !important;
  }
  body.projector .status-chip { font-size: 15px !important; padding: 6px 16px !important; }
  body.projector .card-role > div > .flex > span.mono { font-size: 15px !important; margin-right: 12px !important; }
  body.projector .live-dot { width: 14px; height: 14px; }
  body.projector #admin-btn { display: none; }
  body.projector #action-area { display: none; }
  body.projector footer { font-size: 13px !important; padding-top: 1rem !important; }
  body.projector #role-grid { gap: 1.25rem !important; }

  @media (max-width: 768px) { .modal { padding: 20px; } }
</style>
</head>
<body>

<div class="main-wrap max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
  <div id="setup-banner" class="setup-banner" style="display:none;">
    <div class="mono text-xs uppercase tracking-wider mb-1" style="color: var(--warning);">⚠ Setup required</div>
    <div class="text-sm">Firebase URL is not configured.</div>
  </div>

  <header class="flex items-start justify-between gap-4 mb-8">
    <div>
      <div class="mono text-xs uppercase tracking-wider" style="color: var(--accent);">INST346 · Lab 11</div>
      <h1 class="display text-2xl sm:text-3xl font-bold mt-1">Role Assignment Board</h1>
      <div class="text-sm mt-1" style="color: var(--text-muted);">Specifications Lab, Part 1 · Dr. Frezzo</div>
    </div>
    <div class="flex flex-col items-end gap-2">
      <div class="flex items-center gap-2 px-3 py-1.5 rounded-full" style="background: var(--bg-card); border: 1px solid var(--border);">
        <div id="live-dot" class="live-dot"></div>
        <span class="mono text-xs" style="color: var(--text-secondary);">LIVE</span>
      </div>
      <button id="admin-btn" class="btn btn-ghost" style="padding: 6px 12px; font-size: 12px;">⚙ TA</button>
    </div>
  </header>

  <div class="card p-4 mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
    <div>
      <div class="mono text-xs uppercase tracking-wider" style="color: var(--text-muted);">Current Session</div>
      <div id="session-label" class="display text-xl font-bold mt-0.5">—</div>
    </div>
    <div class="flex items-center gap-2 text-sm" style="color: var(--text-secondary);">
      <span class="mono text-xs" style="color: var(--text-muted);">FILLED:</span>
      <span id="total-filled" class="mono font-bold text-base" style="color: var(--accent);">0</span>
      <span style="color: var(--text-muted);">/</span>
      <span class="mono text-base">9</span>
      <span class="mono text-xs ml-2" style="color: var(--text-muted);">GROUPS</span>
    </div>
  </div>

  <section>
    <h2 class="display text-sm font-semibold uppercase tracking-wider mb-3" style="color: var(--text-muted);">Expert Roles</h2>
    <div id="role-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8"></div>
  </section>

  <section id="action-area" class="card p-5 sm:p-6 mb-6 fade-in"></section>

  <footer class="flex flex-col sm:flex-row justify-between items-center gap-2 text-xs mono mt-8 pt-4" style="color: var(--text-muted); border-top: 1px solid var(--border);">
    <div>INST346 · TECHNOLOGIES, INFRASTRUCTURE & ARCHITECTURE</div>
    <div>Last synced <span id="sync-time">—</span></div>
  </footer>
</div>

<div id="admin-modal" class="modal-backdrop" style="display:none;"><div class="modal" onclick="event.stopPropagation()"></div></div>
<div id="toast-container"></div>

<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║  CONFIGURATION                                               ║
// ╚══════════════════════════════════════════════════════════════╝
const FIREBASE_URL = 'https://inst346-lab11-default-rtdb.firebaseio.com';
const ADMIN_PASSWORD = 'frezzo346';
// ═══════════════════════════════════════════════════════════════

// Projection mode detection
const isProjector = new URLSearchParams(window.location.search).get('board') === '1';
if (isProjector) document.body.classList.add('projector');

const ROLES = [
  { id: 'telecommuter', name: 'Telecommuter Project Managers', short: 'Home Network', desc: 'Research the optimal home network & ISP plan for each of the 10 remote employees.', color: 'var(--role-1)', colorHex: '#4f8eff' },
  { id: 'onprem_computing', name: 'On-Premises Computing Technicians', short: 'Office Hardware', desc: 'Configure workstations, servers, and client systems for the on-site lab/office.', color: 'var(--role-2)', colorHex: '#10d48e' },
  { id: 'onprem_network', name: 'On-Premises Network Technicians', short: 'Office Network', desc: 'Design the office LAN — firewall, switches, routers, access points, controllers.', color: 'var(--role-3)', colorHex: '#b366ff' },
  { id: 'cloud', name: 'Cloud Services Administrators', short: 'Cloud Services', desc: 'Select cloud subscriptions supporting both teleworkers and the on-site lab.', color: 'var(--role-4)', colorHex: '#ff9647' }
];

const NORMAL_SLOTS = 2;
const TOTAL_GROUPS = 9;
const POLL_INTERVAL_MS = 3000;

function getSessionKey(override) {
  const now = new Date();
  const d = now.toISOString().slice(0, 10);
  const h = now.getHours();
  let slot;
  if (override != null) slot = override === 9 ? '0900' : override === 10 ? '1000' : '1100';
  else { if (h < 10) slot = '0900'; else if (h < 11) slot = '1000'; else slot = '1100'; }
  return { key: `inst346_lab11_${d}_${slot}`, label: slotLabel(slot), slot, date: d };
}
function slotLabel(slot) { return { '0900': '9:00 AM Session', '1000': '10:00 AM Session', '1100': '11:00 AM Session' }[slot]; }

let state = { sessionKey: null, sessionLabel: null, slot: null, data: blankData(), myGroup: null, connected: true };

function blankData() {
  const assignments = {};
  ROLES.forEach(r => assignments[r.id] = { normal: [], override: [] });
  return { assignments, updated: Date.now() };
}

function firebasePath() { return `${FIREBASE_URL}/sessions/${state.sessionKey}.json`; }

async function loadState() {
  if (FIREBASE_URL === 'PASTE_FIREBASE_URL_HERE') { document.getElementById('setup-banner').style.display = 'block'; return; }
  try {
    const res = await fetch(firebasePath());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data && data.assignments) {
      ROLES.forEach(r => {
        if (!data.assignments[r.id]) data.assignments[r.id] = { normal: [], override: [] };
        if (!Array.isArray(data.assignments[r.id].normal)) data.assignments[r.id].normal = Object.values(data.assignments[r.id].normal || {});
        if (!Array.isArray(data.assignments[r.id].override)) data.assignments[r.id].override = Object.values(data.assignments[r.id].override || {});
      });
      state.data = data;
    } else {
      state.data = blankData();
    }
    state.connected = true;
  } catch (e) { console.error('Load failed', e); state.connected = false; }
}

async function saveState() {
  state.data.updated = Date.now();
  try {
    const res = await fetch(firebasePath(), { method: 'PUT', body: JSON.stringify(state.data) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    state.connected = true; return true;
  } catch (e) { console.error('Save failed', e); state.connected = false; toast('Save failed — check Firebase rules', 'error'); return false; }
}

function getRoleForGroup(g) { for (const role of ROLES) { const a = state.data.assignments[role.id]; if (a.normal.includes(g) || a.override.includes(g)) return { roleId: role.id, isOverride: a.override.includes(g) }; } return null; }
function totalFilled() { let n = 0; for (const role of ROLES) { n += state.data.assignments[role.id].normal.length; n += state.data.assignments[role.id].override.length; } return n; }
function normalSlotsLeft(id) { return NORMAL_SLOTS - state.data.assignments[id].normal.length; }
function roleIsFullForStudents(id) { return normalSlotsLeft(id) <= 0; }

function render() {
  document.getElementById('session-label').textContent = state.sessionLabel;
  document.getElementById('total-filled').textContent = totalFilled();
  document.getElementById('live-dot').className = 'live-dot' + (state.connected ? '' : ' stale');
  document.getElementById('role-grid').innerHTML = ROLES.map(r => renderRoleCard(r)).join('');
  document.getElementById('action-area').innerHTML = renderActionArea();
  attachActionHandlers();
  document.getElementById('sync-time').textContent = timeAgo(state.data.updated);
}

function renderRoleCard(role) {
  const a = state.data.assignments[role.id];
  const isFull = roleIsFullForStudents(role.id);
  const slotsLeft = normalSlotsLeft(role.id);
  let pips = '';
  for (let i = 0; i < NORMAL_SLOTS; i++) { const g = a.normal[i]; pips += `<span class="slot-pip ${g !== undefined ? 'filled' : ''}" style="--role-color: ${role.color};">${g !== undefined ? g : ''}</span>`; }
  a.override.forEach(g => { pips += `<span class="slot-pip override">${g}</span>`; });
  let chip;
  if (a.override.length > 0) chip = `<span class="status-chip chip-override">● 9th group assigned</span>`;
  else if (isFull) chip = `<span class="status-chip chip-full">● Full</span>`;
  else chip = `<span class="status-chip chip-open">● ${slotsLeft} slot${slotsLeft>1?'s':''} open</span>`;
  return `
    <div class="card card-role p-5 ${isFull && a.override.length===0 ? 'full' : ''}" style="--role-color: ${role.color};">
      <div class="flex items-start justify-between gap-3 mb-3">
        <div>
          <div class="role-short mono text-xs uppercase tracking-wider" style="color: var(--text-muted);">${role.short}</div>
          <div class="role-name font-semibold text-base mt-0.5" style="line-height: 1.25;">${role.name}</div>
        </div>
        ${chip}
      </div>
      <p class="role-desc text-sm mb-4" style="color: var(--text-secondary);">${role.desc}</p>
      <div class="flex items-center flex-wrap gap-1"><span class="mono text-xs mr-2" style="color: var(--text-muted);">GROUPS:</span>${pips}</div>
    </div>`;
}

function renderActionArea() {
  if (!state.myGroup) {
    return `<div class="display text-xs uppercase tracking-wider mb-2" style="color: var(--text-muted);">Step 1 of 2</div>
      <h3 class="display text-lg font-bold mb-1">Enter your group number</h3>
      <p class="text-sm mb-4" style="color: var(--text-secondary);">Your TA will have assigned you a group number from 1 to ${TOTAL_GROUPS}.</p>
      <div class="flex flex-col sm:flex-row gap-2">
        <input id="group-input" class="input" type="number" min="1" max="${TOTAL_GROUPS}" placeholder="e.g. 3" style="flex: 1;">
        <button id="group-next" class="btn btn-primary">Continue →</button>
      </div>`;
  }
  const existing = getRoleForGroup(state.myGroup);
  if (existing) {
    const role = ROLES.find(r => r.id === existing.roleId);
    return `<div class="display text-xs uppercase tracking-wider mb-2" style="color: var(--success);">✓ Registered</div>
      <h3 class="display text-lg font-bold mb-1">Group ${state.myGroup} is locked in</h3>
      <p class="text-sm mb-4" style="color: var(--text-secondary);">Your group's expert role for this session:</p>
      <div class="p-4 rounded-lg" style="background: var(--bg-elevated); border-left: 3px solid ${role.color};">
        <div class="font-semibold">${role.name}</div>
        <div class="text-xs mono mt-0.5" style="color: var(--text-muted);">${existing.isOverride ? 'Assigned by TA' : 'Self-selected'}</div>
      </div>
      <button id="clear-group" class="btn btn-ghost mt-4" style="padding: 8px 14px; font-size: 12px;">Not my group? Re-enter number</button>`;
  }
  const allFull = ROLES.every(r => roleIsFullForStudents(r.id));
  if (allFull) {
    return `<div class="display text-xs uppercase tracking-wider mb-2" style="color: var(--warning);">⚠ All Slots Taken</div>
      <h3 class="display text-lg font-bold mb-1">Please wait for TA assignment</h3>
      <p class="text-sm mb-4" style="color: var(--text-secondary);">You're Group ${state.myGroup}. All 8 self-select slots are filled. Your TA will manually assign your group to a role now — hang tight, the board will update live.</p>
      <button id="clear-group" class="btn btn-ghost" style="padding: 8px 14px; font-size: 12px;">Wrong group number?</button>`;
  }
  return `<div class="display text-xs uppercase tracking-wider mb-2" style="color: var(--text-muted);">Step 2 of 2 · Group ${state.myGroup}</div>
    <h3 class="display text-lg font-bold mb-1">Claim your expert role</h3>
    <p class="text-sm mb-4" style="color: var(--text-secondary);">Pick one area your group will deep-dive into for Part 1. First-come, first-served.</p>
    <div class="space-y-2">
      ${ROLES.map(r => { const full = roleIsFullForStudents(r.id); return `
        <button class="btn btn-role role-claim" data-role="${r.id}" ${full ? 'disabled' : ''} style="--role-color: ${r.color};">
          <span style="flex:1; text-align:left;">
            <div class="font-semibold">${r.name}</div>
            <div class="text-xs mono mt-0.5" style="color: var(--text-muted);">${r.short} · ${full ? 'FULL' : normalSlotsLeft(r.id) + ' slot(s) open'}</div>
          </span>
          <span style="color: ${r.color};">→</span>
        </button>`; }).join('')}
    </div>
    <button id="clear-group" class="btn btn-ghost mt-4" style="padding: 8px 14px; font-size: 12px;">← Change group number</button>`;
}

function attachActionHandlers() {
  const gn = document.getElementById('group-next');
  if (gn) {
    const input = document.getElementById('group-input');
    const go = () => { const v = parseInt(input.value); if (isNaN(v) || v < 1 || v > TOTAL_GROUPS) { toast(`Enter a number 1–${TOTAL_GROUPS}`, 'error'); return; } state.myGroup = v; render(); };
    gn.onclick = go; input.addEventListener('keydown', e => { if (e.key === 'Enter') go(); }); input.focus();
  }
  const cb = document.getElementById('clear-group');
  if (cb) cb.onclick = () => { state.myGroup = null; render(); };
  document.querySelectorAll('.role-claim').forEach(btn => { btn.onclick = () => claimRole(btn.dataset.role); });
}

async function claimRole(roleId) {
  await loadState();
  const existing = getRoleForGroup(state.myGroup);
  if (existing) { const r = ROLES.find(x => x.id === existing.roleId); toast(`Group ${state.myGroup} already registered as ${r.short}`, 'success'); render(); return; }
  if (roleIsFullForStudents(roleId)) { const r = ROLES.find(x => x.id === roleId); toast(`${r.short} was just claimed — pick another`, 'error'); render(); return; }
  state.data.assignments[roleId].normal.push(state.myGroup);
  const ok = await saveState();
  if (ok) { const r = ROLES.find(x => x.id === roleId); toast(`Group ${state.myGroup} locked in as ${r.short} ✓`, 'success'); }
  render();
}

function openAdmin() { const pw = prompt('TA password:'); if (pw !== ADMIN_PASSWORD) { if (pw !== null) toast('Incorrect password', 'error'); return; } renderAdmin(); document.getElementById('admin-modal').style.display = 'flex'; }
function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }

function renderAdmin() {
  const modal = document.querySelector('#admin-modal .modal');
  const pageUrl = window.location.href.split('?')[0];  // base URL for QR (no params)
  const projectorUrl = pageUrl + '?board=1';
  const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&bgcolor=141a26&color=e8ecf4&data=' + encodeURIComponent(pageUrl);
  const placed = new Set();
  ROLES.forEach(r => { state.data.assignments[r.id].normal.forEach(g => placed.add(g)); state.data.assignments[r.id].override.forEach(g => placed.add(g)); });
  const unplaced = []; for (let i = 1; i <= TOTAL_GROUPS; i++) if (!placed.has(i)) unplaced.push(i);

  modal.innerHTML = `
    <div class="flex items-start justify-between mb-4">
      <div><div class="mono text-xs uppercase tracking-wider" style="color: var(--accent);">TA Admin</div>
      <h2 class="display text-xl font-bold mt-1">Session Controls</h2></div>
      <button onclick="closeAdmin()" class="btn btn-ghost" style="padding: 6px 10px;">✕</button>
    </div>

    <div class="mb-5 p-4 rounded-lg" style="background: rgba(0,212,255,0.08); border: 1px solid var(--accent);">
      <div class="mono text-xs uppercase tracking-wider mb-2" style="color: var(--accent);">📺 Projection View</div>
      <div class="text-sm mb-3">Open the big classroom-display version in a new tab:</div>
      <a href="${projectorUrl}" target="_blank" class="btn btn-primary" style="width: 100%;">Open Projection Board ↗</a>
    </div>

    <div class="mb-5">
      <div class="mono text-xs uppercase tracking-wider mb-2" style="color: var(--text-muted);">Viewing Session</div>
      <div class="flex flex-wrap gap-2">
        <button class="tab-btn ${state.slot==='0900'?'active':''}" onclick="switchSession(9)">9:00 AM</button>
        <button class="tab-btn ${state.slot==='1000'?'active':''}" onclick="switchSession(10)">10:00 AM</button>
        <button class="tab-btn ${state.slot==='1100'?'active':''}" onclick="switchSession(11)">11:00 AM</button>
        <button class="tab-btn" onclick="switchSession('auto')">Auto</button>
      </div>
    </div>
    <div class="mb-5">
      <div class="mono text-xs uppercase tracking-wider mb-2" style="color: var(--text-muted);">Current Board</div>
      <div class="space-y-2">
        ${ROLES.map(r => { const a = state.data.assignments[r.id]; const all = [...a.normal.map(g => ({g, o: false})), ...a.override.map(g => ({g, o: true}))];
        return `<div class="p-3 rounded-lg" style="background: var(--bg-elevated); border-left: 3px solid ${r.color};">
          <div class="text-sm font-semibold">${r.short}</div>
          <div class="flex flex-wrap items-center mt-1.5">
            ${all.length === 0 ? '<span class="text-xs mono" style="color: var(--text-muted);">(empty)</span>' : all.map(x => `<span class="group-badge" style="background:${x.o?'var(--warning)':r.colorHex};">G${x.g}${x.o?' ★':''}</span>`).join('')}
          </div></div>`; }).join('')}
      </div>
    </div>
    ${unplaced.length > 0 ? `
      <div class="p-4 rounded-lg mb-5" style="background: var(--bg-elevated); border: 1px solid var(--warning);">
        <div class="mono text-xs uppercase tracking-wider mb-1" style="color: var(--warning);">⚠ Unplaced group(s)</div>
        <div class="text-sm mb-3">Assign: ${unplaced.map(g=>`<strong>Group ${g}</strong>`).join(', ')}</div>
        <div class="flex flex-col sm:flex-row gap-2">
          <select id="admin-group" class="input" style="flex: 1;">${unplaced.map(g => `<option value="${g}">Group ${g}</option>`).join('')}</select>
          <select id="admin-role" class="input" style="flex: 1;">${ROLES.map(r => `<option value="${r.id}">${r.short}</option>`).join('')}</select>
          <button onclick="adminAssign()" class="btn btn-primary">Assign</button>
        </div>
        <div class="text-xs mt-2 mono" style="color: var(--text-muted);">(Creates an override slot.)</div>
      </div>` : `<div class="p-4 rounded-lg mb-5 text-center" style="background: var(--bg-elevated);"><div class="text-sm" style="color: var(--success);">✓ All ${TOTAL_GROUPS} groups placed</div></div>`}
    <div class="mb-5">
      <div class="mono text-xs uppercase tracking-wider mb-2" style="color: var(--text-muted);">Remove a Group</div>
      <div class="flex flex-col sm:flex-row gap-2">
        <input id="admin-remove" class="input" type="number" min="1" max="${TOTAL_GROUPS}" placeholder="Group # to unassign" style="flex: 1;">
        <button onclick="adminRemove()" class="btn btn-ghost">Unassign</button>
      </div>
    </div>
    <div class="mb-5">
      <div class="mono text-xs uppercase tracking-wider mb-2" style="color: var(--text-muted);">QR Code for Students</div>
      <div class="p-4 rounded-lg flex flex-col sm:flex-row items-center gap-4" style="background: var(--bg-elevated);">
        <img src="${qrUrl}" alt="QR Code" style="width: 160px; height: 160px; border-radius: 8px; background: #141a26;">
        <div class="text-xs break-all mono" style="color: var(--text-muted);">
          <div class="mb-2" style="color: var(--text-primary);">Students scan this (no ?board=1 — students get the form):</div>
          ${pageUrl}
          <button onclick="navigator.clipboard.writeText('${pageUrl}'); toast('Link copied', 'success');" class="btn btn-ghost mt-2" style="padding: 6px 12px; font-size: 11px;">Copy link</button>
        </div>
      </div>
    </div>
    <div class="p-4 rounded-lg" style="background: rgba(255,85,119,0.08); border: 1px solid rgba(255,85,119,0.3);">
      <div class="mono text-xs uppercase tracking-wider mb-2" style="color: var(--danger);">Danger Zone</div>
      <button onclick="adminReset()" class="btn btn-ghost" style="border-color: var(--danger); color: var(--danger);">Reset this session's board</button>
    </div>`;
}

async function switchSession(h) { const s = h === 'auto' ? getSessionKey() : getSessionKey(h); state.sessionKey = s.key; state.sessionLabel = s.label; state.slot = s.slot; await loadState(); renderAdmin(); render(); }
async function adminAssign() {
  const group = parseInt(document.getElementById('admin-group').value);
  const role = document.getElementById('admin-role').value;
  await loadState();
  ROLES.forEach(r => { state.data.assignments[r.id].normal = state.data.assignments[r.id].normal.filter(g => g !== group); state.data.assignments[r.id].override = state.data.assignments[r.id].override.filter(g => g !== group); });
  state.data.assignments[role].override.push(group);
  await saveState(); renderAdmin(); render();
  toast(`Group ${group} assigned to ${ROLES.find(r=>r.id===role).short}`, 'success');
}
async function adminRemove() {
  const group = parseInt(document.getElementById('admin-remove').value);
  if (isNaN(group) || group < 1 || group > TOTAL_GROUPS) { toast('Enter a valid group number', 'error'); return; }
  await loadState();
  let removed = false;
  ROLES.forEach(r => {
    const b = state.data.assignments[r.id].normal.length + state.data.assignments[r.id].override.length;
    state.data.assignments[r.id].normal = state.data.assignments[r.id].normal.filter(g => g !== group);
    state.data.assignments[r.id].override = state.data.assignments[r.id].override.filter(g => g !== group);
    if (b !== state.data.assignments[r.id].normal.length + state.data.assignments[r.id].override.length) removed = true;
  });
  if (removed) { await saveState(); renderAdmin(); render(); toast(`Group ${group} unassigned`, 'success'); }
  else toast(`Group ${group} wasn't assigned`, 'error');
}
async function adminReset() { if (!confirm(`Reset ${state.sessionLabel}? All assignments cleared.`)) return; state.data = blankData(); await saveState(); renderAdmin(); render(); toast('Board reset', 'success'); }

function toast(msg, kind = 'success') { const c = document.getElementById('toast-container'); const el = document.createElement('div'); el.className = `toast ${kind}`; el.textContent = msg; c.appendChild(el); setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000); }
function timeAgo(ts) { if (!ts) return 'just now'; const d = Math.floor((Date.now() - ts) / 1000); if (d < 5) return 'just now'; if (d < 60) return d + 's ago'; if (d < 3600) return Math.floor(d/60) + 'm ago'; return Math.floor(d/3600) + 'h ago'; }

async function init() {
  const s = getSessionKey(); state.sessionKey = s.key; state.sessionLabel = s.label; state.slot = s.slot;
  await loadState(); render();
  const adminBtn = document.getElementById('admin-btn');
  if (adminBtn) adminBtn.onclick = openAdmin;
  document.getElementById('admin-modal').onclick = closeAdmin;
  setInterval(async () => {
    const cs = getSessionKey();
    if (cs.key !== state.sessionKey) { state.sessionKey = cs.key; state.sessionLabel = cs.label; state.slot = cs.slot; state.myGroup = null; }
    await loadState(); render();
  }, POLL_INTERVAL_MS);
}
init();
</script>
</body>
</html>
